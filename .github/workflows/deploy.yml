name: 🚀 Deploy Cine-Delices to GitHub Pages

on:
  push:
    branches:
      - main # Déclenche le déploiement à chaque push sur main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupère ton code source
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Configure Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Installe les dépendances du projet frontend
      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      # 4️⃣ Construit le projet Vite
      - name: Build project
        working-directory: ./frontend
        run: npm run build

      # 5️⃣ Déploie sur GitHub Pages avec ton token personnel
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_PAGES_DEPLOY }}
          publish_dir: ./frontend/dist
          force_orphan: true
